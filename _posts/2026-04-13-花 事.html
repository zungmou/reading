<p> 　　骤然就开了</p>

<p>杏花、桃花、樱花、野蔷薇、蒲公英……</p>

<p>绢帛般的花瓣</p>

<p>芬芳的春天</p>

<p>这么轻柔</p>

<p></p>

<p>风一吹就散了</p>

<p>杏花、桃花、樱花、野蔷薇、蒲公英……</p>

<p>蝴蝶数着飘零的花瓣</p>

<p>像在翻阅几页信笺</p>

<p>这么轻柔</p>

<p></p>

<p>嘘，不要喊它们的名字</p>

<p>一喊就应声而开而落</p>

<p>仿佛淡淡的欢喜</p>

<p>抑或淡淡的惆怅</p>

<p>撑开又收拢的绽放</p>

<p>这么轻柔 </p>
