<p> 　　云影在波光细闪的海面上游移</p>

<p>夏风摸着海浪的方向涌来</p>

<p>我们踩下的足印</p>

<p>被大海的温柔抚平</p>

<p>她站在阳光投下的光影里</p>

<p>数不清的细沙躺在绵软的鞋底</p>

<p>沙滩上寻宝的父子</p>

<p>将小铲伸向露出细孔的地方</p>

<p>微生物，深呼吸</p>

<p>开启了向外的通道</p>

<p>它们用薄如蝉翼的</p>

<p>一张一合</p>

<p>探索着未知领域的危险 </p>
