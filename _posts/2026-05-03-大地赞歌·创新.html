<p>美术是青年一代追求梦想、记录时代、探索创新的鲜活载体。近年来，中国青年美术展览品牌集群日益成熟，呈现出蓬勃的创作生态与清晰的学术方向。适逢“五一”国际劳动节、“五四”青年节之际，本版特邀相关机构负责人、专家学者以及从各类青年美展中脱颖而出并成长为名家的参展代表撰文，分别从不同维度分享实践经验，探讨如何更好“出人才、出作品”，激励更多青年人以劳动致敬青春，以创作回应时代。</p>

<p>——编&nbsp;&nbsp;者</p>
