<p> 　　我摸着它，表面粗糙</p>

<p>造型不规则</p>

<p>没有找到可以开口发声的部位</p>

<p>但上凤门垅村替它开口了</p>

<p>村庄坐落在山丘上</p>

<p>已被命名丑石村</p>

<p>四处留有风口</p>

<p>村庄背后的东吾洋夜夜引吭高歌</p>

<p>为丑石鸣凌云之志</p>

<p>路过的诗人也替它开口</p>

<p>你藏在山丘之中</p>

<p>却也在大海之巅</p>

<p>你是丑石，也是美玉 </p>
