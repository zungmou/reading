<p class="not-indent patt" style="max-width:100%;"><img src="../../../pic/202607/24/a4682cf6-d505-4ea7-848e-29d5a2a8e937.jpg" style="max-width: 100%;" class="picture-illustrating not-indent patt" data-toggle="tooltip" placement="bottom" trigger="hover focus" html="true" data-original-title="&lt;p&gt;　　《大道方兴：读懂中国经济的光明底色》：李玉举、连欣著；安徽人民出版社出版。&lt;/p&gt;&lt;p&gt;　　本书以讲好中国经济发展的优势和特色为切入点，提炼我国在制度根基、产业基础、市场空间、动力机制等方面的优势，帮助读者读懂中国经济的韧性、潜力和光明前景。&lt;/p&gt;"></p><p class="not-indent patt" style="max-width:100%;"><img src="../../../pic/202607/24/37d0e196-ca65-45ed-94e2-9fe257243eb3.jpg" style="max-width: 100%;" class="picture-illustrating not-indent patt" data-toggle="tooltip" placement="bottom" trigger="hover focus" html="true" data-original-title="&lt;p&gt;　　《烽火雁门关》：梅杉著；人民日报出版社、山西人民出版社出版。&lt;/p&gt;&lt;p&gt;　　本书以雁门关为叙事背景，以四代人的命运起伏作为主要线索，串起一个家族从清末动荡、辛亥风云到全民抗战的悲欢离合，勾勒出雁门儿女守护乡土、不屈抗争的鲜活群像。&lt;/p&gt;"></p>
