<p>每逢农历五月初五，家里的长辈就会说：“端午节，有讲究。”采一束艾叶，祈愿安康；包一个粽子，品尝美味；划一条龙舟，竞渡江河……</p>

<p>如此丰富的“打开方式”，背后都有一个字：情。那年今日，前人感时应物，吟唱着亲情、友情、爱国情，沉淀在一首诗、一部戏里。历经岁月淘洗，凝结成一个民族的共同文本，承载着千载不变的普遍情感。</p>

<p>今时，让我们趁着节日的契机，重温来路。</p>

<p>——编&nbsp;&nbsp;者</p>
