<p> 　　九九加一九</p>

<p>等于多少</p>

<p>这是春天出给我们的</p>

<p>一道算术题</p>

<p></p>

<p>一夜细雨过后</p>

<p>耕牛率先出场了</p>

<p>满地里游走着</p>

<p>寻找正确的答案</p>

<p></p>

<p>农人跟在后面</p>

<p>一边扶犁</p>

<p>一边挥鞭</p>

<p>同时也在暗自思索</p>

<p></p>

<p>因为九九终归一</p>

<p>那答案或许是</p>

<p>及时播种的指缝间</p>

<p>最先滑落的一粒粟</p>

<p></p>

<p>因为扶摇九万里</p>

<p>那答案或许是</p>

<p>金秋收割的银镰上</p>

<p>令人欣喜的万颗子 </p>
