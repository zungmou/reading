<p> 　　信仰的味道是甜的。这滋味，是革命先辈浴血抗争后的苦尽甘来，是改革先锋搏击风浪后的醇厚隽永，更是当代共产党员接过接力棒、为人民谋幸福中的馥郁清甜。这滋味，也被一代代文艺工作者熔铸在精品创作里，回味悠长。</p>

<p>即日起，本报推出“大地风华”系列专版，热烈庆祝中国共产党成立105周年，一同回望历史，感悟初心使命，坚定理想信念。</p>

<p>——编&nbsp;&nbsp;者 </p>
