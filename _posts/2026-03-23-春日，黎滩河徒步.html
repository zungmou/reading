title: "春日，黎滩河徒步"
author: "李元胜"
source: "《人民日报》（2026年03月23日第20版）"
comments: true
---

<p> 　　过溪潭，溯流而上</p>

<p>有支流，就有很美的小桥</p>

<p>灌木如铁，岩石生苔</p>

<p></p>

<p>举目皆是水墨</p>

<p>溪石斑紧贴水底，白鹭飞过</p>

<p>扯动画轴上的线条</p>

<p></p>

<p>越往前，越感觉身体接近纸质</p>

<p>溪涧无语，人入画中</p>

<p></p>

<p>有时置身都市</p>

<p>俯首书案，揣摩一副春联</p>

<p>忽地惊讶抬头——</p>

<p>墙上浮现陌生的山水</p>

<p></p>

<p>有时寄身此间</p>

<p>是凌空巨石</p>

<p>是溪畔衰草，等待春风染绿</p>

<p></p>

<p>是画中多余的徒步者</p>

<p>他心生欢喜，并不想破纸而出 </p>
