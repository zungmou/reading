<p class="not-indent patt" style="max-width:100%;"><img src="../../../pic/202602/27/69494008-4093-4346-897f-724f7751e754.jpg.2" style="max-width: 100%;" class="picture-illustrating not-indent patt" data-toggle="tooltip" placement="bottom" trigger="hover focus" html="true" data-original-title="&lt;p&gt;　　《嬗变：乡村中国》：雷明、王钰晴著；清华大学出版社出版。&lt;/p&gt;&lt;p&gt;　　本书围绕如何实现乡村振兴这一主题，从治理、组织、文化、人才等角度立体展望中国乡村未来发展之路。&lt;/p&gt;"></p><p class="not-indent patt" style="max-width:100%;"><img src="../../../pic/202602/27/74af6f85-07f9-430c-bb1b-a21f4b01c8b5.jpg.2" style="max-width: 100%;" class="picture-illustrating not-indent patt" data-toggle="tooltip" placement="bottom" trigger="hover focus" html="true" data-original-title="&lt;p&gt;　　《遗落的鲸灵：长江瑰宝白鱀豚》：王丁、杨光主编；江苏凤凰科学技术出版社出版。&lt;/p&gt;&lt;p&gt;　　本书系统介绍了珍稀物种白鱀豚的形态特征、生活场景和文化内涵，以小见大阐释长江生物多样性对生态保护的重要意义。&lt;/p&gt;"></p>
