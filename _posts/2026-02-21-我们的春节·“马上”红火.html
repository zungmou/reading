<p>跃马迎春！一年一度的光影之约，如期而至。</p>

<p>春节期间，电影院人头攒动，“看电影了吗？”“看几部了？”几乎成为节日问候语。精彩不止于银幕之上，大家跟着电影去旅行、品美食、赏非遗，共迎中国电影的新春“开门红”。</p>

<p>本版邀请6部春节档电影主创讲述创作背后的故事，让我们一起感受戏里戏外马不停蹄的干劲、万马奔腾的活力，品味这红红火火的日子。</p>

<p>——编&nbsp;&nbsp;者</p>
