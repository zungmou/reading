comments: true

<p>“十五五”规划建议提出“激发全民族文化创新创造活力，繁荣发展社会主义文化”。文化原创力，不仅关乎精品创作的土壤，更关乎我们的文脉赓续传承，关乎我们的精神家园。面对丰厚的文化资源，面对鲜活的社会实践，面对突飞猛进的技术浪潮，文化原创力从何而来又如何不断提升？2026年全国两会召开之际，本版邀请全国人大代表、全国政协委员探讨“何以提升文化原创力”这一话题，分享实践体会与深度思考。</p>

<p>——编&nbsp;&nbsp;者</p>
