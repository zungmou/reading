<p> 　　我不认识你</p>

<p>我知道你出生在太行山脉</p>

<p>在战火硝烟中</p>

<p>你牵着伟人的衣袖</p>

<p>一路来到了金台</p>

<p></p>

<p>我不认识你</p>

<p>我知道你在初升的太阳中</p>

<p>把中国的声音</p>

<p>传到了五洲四海</p>

<p></p>

<p>我才认识你</p>

<p>我看见你张开双臂迎接我的到来</p>

<p>在春天的季节里</p>

<p>我牵着你的衣袖</p>

<p>感受你深情的关怀</p>

<p></p>

<p>我才认识你</p>

<p>我知道你会在复兴的伟业中</p>

<p>和我们一起</p>

<p>走向金色的未来 </p>
