author: "张战"

comments: true
---

<p> 　　我接住这一刻的寂静——</p>

<p>一只光的蝴蝶展开它的巨翅</p>

<p>轻轻覆住了湖面</p>

<p></p>

<p>它的翅下</p>

<p>群鱼欢嬉唼喋</p>

<p>细浪轻摇湖光</p>

<p></p>

<p>它的翅上</p>

<p>飞鸟以影子书写它们的言语</p>

<p>远处群山送来绿的浩荡</p>

<p></p>

<p>寂静——</p>

<p>我怎能不领受这万物的空阔与相亲</p>

<p>是对岸的柳叶模仿了鱼</p>

<p>是鱼模仿了这只空船</p>

<p></p>

<p>船模仿新月</p>

<p>而无限的湖水</p>

<p>模仿无限的天空 </p>
