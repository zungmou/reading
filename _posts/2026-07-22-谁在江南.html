title: "谁在江南"
author: "苟红兵"

comments: true
---

<p> 　　我渴望的江南，</p>

<p>有汀洲白鹭水天，</p>

<p>可撑一枝绿篙，</p>

<p>去荻花和斜阳间翩跹。</p>

<p></p>

<p>我往来的江南，</p>

<p>有都市乡村庭院，</p>

<p>盛得下宽窄锦里，</p>

<p>撑得开雨巷里的油布伞。</p>

<p></p>

<p>我耕读的江南，</p>

<p>有沃野厚土南山，</p>

<p>吟诵的豪放与婉约，</p>

<p>孕育吴越诗书的灵感。</p>

<p></p>

<p>今夜，谁在江南，</p>

<p>随星河鹭起、烟雨浓淡，</p>

<p>吹彻羌笛的幽怨，</p>

<p>让相思泪落枕畔。 </p>
