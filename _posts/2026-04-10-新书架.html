<p class="not-indent patt" style="max-width:100%;"><img src="../../../pic/202604/10/a008e5d6-10a5-49d8-a4cf-fd485b8500c3.jpg.2" style="max-width: 100%;" class="picture-illustrating not-indent patt" data-toggle="tooltip" placement="bottom" trigger="hover focus" html="true" data-original-title="&lt;p&gt;　　《中国之名  星海之约：给重大科技成果冠上中国名》：邱然、倪麟、王烁著；山东人民出版社出版。&lt;/p&gt;&lt;p&gt;　　本书深入解读“嫦娥”“鹊桥”“天宫”“神舟”等重大科技成果“中国名”背后的故事，彰显了科技创新与文化自信的深度融合。&lt;/p&gt;"></p><p class="not-indent patt" style="max-width:100%;"><img src="../../../pic/202604/10/3bf05f76-5a93-4665-b497-4a726d826f91.jpg.2" style="max-width: 100%;" class="picture-illustrating not-indent patt" data-toggle="tooltip" placement="bottom" trigger="hover focus" html="true" data-original-title="&lt;p&gt;　　《图说北京古城变迁史》：岳升阳、张鹏飞、王洪波等著，岳升阳、马悦婷绘图；北京出版社出版。&lt;/p&gt;&lt;p&gt;　　本书梳理了从先秦燕蓟到隋唐幽州、再到明清北京的发展脉络，勾勒出一个鲜活生动的古城北京。&lt;/p&gt;"></p>
