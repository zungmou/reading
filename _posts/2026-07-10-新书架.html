<p class="not-indent patt" style="max-width:100%;"><img src="../../../pic/202607/10/5a7c7eb4-f94a-4f63-a7b7-3e19eb295162.jpg" style="max-width: 100%;" class="picture-illustrating not-indent patt" data-toggle="tooltip" placement="bottom" trigger="hover focus" html="true" data-original-title="&lt;p&gt;　　《深海经济：探索海底两万里商业版图》：曹友生、施卫东等编著；电子工业出版社出版。&lt;/p&gt;&lt;p&gt;　　本书深入介绍了深海油气、矿产、生物基因等战略资源的巨大潜力，通过解析中国深海产业实践，展现了深海经济未来发展的宏伟蓝图。&lt;/p&gt;"></p><p class="not-indent patt" style="max-width:100%;"><img src="../../../pic/202607/10/25344f74-aea9-46f0-aa99-569237931ebb.jpg" style="max-width: 100%;" class="picture-illustrating not-indent patt" data-toggle="tooltip" placement="bottom" trigger="hover focus" html="true" data-original-title="&lt;p&gt;　　《隋唐洛阳城空间体系研究》：霍宏伟著；文物出版社出版。&lt;/p&gt;&lt;p&gt;　　本书以隋唐洛阳城空间布局作为切入点，将古代遗存放在特定的城市时空中去研究，揭示洛阳在中国古都史上的重要地位。&lt;/p&gt;"></p>
