<p class="not-indent patt" style="max-width:100%;"><img src="../../../pic/202605/15/e20d5190-6022-4ea0-88ac-44b80961f320.jpg.2" style="max-width: 100%;" class="picture-illustrating not-indent patt" data-toggle="tooltip" placement="bottom" trigger="hover focus" html="true" data-original-title="&lt;p&gt;　　《宋学四讲》：邓小南、陈来、朱刚、赵冬梅著；浙江古籍出版社出版。&lt;/p&gt;&lt;p&gt;　　本书从政治、思想、文学、士人四个维度，展现了宋代历史文化、文学思想、士人情怀的独特魅力。&lt;/p&gt;"></p><p class="not-indent patt" style="max-width:100%;"><img src="../../../pic/202605/15/18f8fb30-6bae-4a9b-9b4d-c38bad4e71e4.jpg.2" style="max-width: 100%;" class="picture-illustrating not-indent patt" data-toggle="tooltip" placement="bottom" trigger="hover focus" html="true" data-original-title="&lt;p&gt;　　《漫步白桦林：插图本俄罗斯艺术史》：贝文力著；华东师范大学出版社出版。&lt;/p&gt;&lt;p&gt;　　以俄罗斯独特的地理环境与民族性格为切入点，系统梳理俄罗斯民间艺术、建筑与雕塑、绘画、音乐、芭蕾、电影等的发展脉络。&lt;/p&gt;"></p>
