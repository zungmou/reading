---

<p> 　　穿过大酉洞桃花就开了</p>

<p>石桌旁坐着五柳先生</p>

<p>流水环伺左右</p>

<p>半杯酒的春天绽放了两千年</p>

<p></p>

<p>太阳能路灯让小径有些恍惚</p>

<p>刚刚卸下笑声的秋千</p>

<p>转眼摇进了斑斓的抖音</p>

<p>而百米外市声渐浓</p>

<p>外卖小哥穿越了翻新的古代</p>

<p></p>

<p>总有些地方要留白</p>

<p>比如远方、原乡和遥远的梦</p>

<p>“世界上有两个桃花源”</p>

<p>一个擦肩而过，一个身在其中 </p>
