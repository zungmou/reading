<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>老人数学练习</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; background-color: #f9f9f9; text-align: center; color: #333; }
        .card { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .problem { font-size: 4rem; font-weight: bold; margin: 20px 0; color: #2c3e50; }
        #answer { font-size: 3rem; width: 120px; text-align: center; border: 2px solid #ddd; border-radius: 10px; padding: 10px; margin: 10px 0; outline: none; }
        .btn-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
        button { font-size: 2rem; padding: 20px; border: none; border-radius: 15px; background: #e0e0e0; cursor: pointer; transition: background 0.2s; }
        button:active { background: #d0d0d0; }
        .btn-confirm { background: #4caf50; color: white; grid-column: span 2; }
        .btn-clear { background: #f44336; color: white; }
        #score { font-size: 1.2rem; margin-top: 10px; color: #666; }
    </style>
</head>
<body>

<div class="card">
    <div id="score">答对：0 题</div>
    <div class="problem" id="problem">0 + 0 = ?</div>
    <div id="answer-display" style="font-size: 3rem; height: 3.5rem; line-height: 3.5rem; border: 2px solid #ddd; border-radius: 10px; margin: 10px 0; color: #333;"></div>
    <div id="feedback" style="height: 1.5rem; margin-top: 10px; color: #f44336; font-weight: bold;"></div>
</div>

<div class="btn-row">
    <button onclick="inputNum(1)">1</button><button onclick="inputNum(2)">2</button><button onclick="inputNum(3)">3</button>
    <button onclick="inputNum(4)">4</button><button onclick="inputNum(5)">5</button><button onclick="inputNum(6)">6</button>
    <button onclick="inputNum(7)">7</button><button onclick="inputNum(8)">8</button><button onclick="inputNum(9)">9</button>
    <button onclick="clearAns()" class="btn-clear">清除</button><button onclick="inputNum(0)">0</button><button onclick="submit()" class="btn-confirm">确定</button>
</div>

<script>
    let num1, num2, op, result, correctCount = 0;
    
    function generate() {
        num1 = Math.floor(Math.random() * 101);
        num2 = Math.floor(Math.random() * 101);
        op = Math.random() > 0.5 ? '+' : '-';
        if (op === '-' && num1 < num2) [num1, num2] = [num2, num1];
        result = op === '+' ? num1 + num2 : num1 - num2;
        document.getElementById('problem').innerText = `${num1} ${op} ${num2} = ?`;
        document.getElementById('answer-display').innerText = '';
        document.getElementById('feedback').innerText = '';
    }

    function inputNum(n) {
        let el = document.getElementById('answer-display');
        if (el.innerText.length < 3) {
            el.innerText += n;
            document.getElementById('feedback').innerText = '';
        }
    }

    function clearAns() { 
        document.getElementById('answer-display').innerText = ''; 
        document.getElementById('feedback').innerText = '';
    }

    function submit() {
        let val = document.getElementById('answer-display').innerText;
        if (val !== '' && parseInt(val) === result) {
            correctCount++;
            document.getElementById('score').innerText = '答对：' + correctCount + ' 题';
            generate();
        } else {
            document.getElementById('feedback').innerText = '不对哦，再试试';
            document.getElementById('answer-display').innerText = '';
        }
    }
    generate();
</script>
</body>
</html>
